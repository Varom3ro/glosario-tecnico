name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

# Otorgar permisos necesarios para el despliegue automático
permissions:
  contents: read
  pages: write
  id-token: write

# Evitar despliegues simultáneos redundantes
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Compilar Proyecto (Vite Build)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir Artefactos Compilados
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Desplegar en la Nube (GitHub Pages)
        id: deployment
        uses: actions/deploy-pages@v4
