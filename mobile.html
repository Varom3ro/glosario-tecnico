<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Glosario Técnico — App Móvil</title>
    
    <meta name="description" content="Consulta y crea términos técnicos desde tu móvil. Glosario inteligente con IA." />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="mobile-app">

      <!-- ========== AUTH SCREEN ========== -->
      <div id="auth-screen" class="screen auth-screen">
        <div class="auth-container">
          <div class="auth-logo">
            <div class="auth-logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
              </svg>
            </div>
            <h1>Glosario<span>Técnico</span></h1>
            <p class="auth-subtitle">Tu biblioteca técnica inteligente</p>
          </div>

          <form id="auth-form" class="auth-form">
            <div class="auth-form-group">
              <label for="auth-email">Correo electrónico</label>
              <input type="email" id="auth-email" placeholder="tu@email.com" required autocomplete="email" />
            </div>
            <div class="auth-form-group">
              <label for="auth-password">Contraseña</label>
              <input type="password" id="auth-password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="current-password" />
            </div>
            <button type="submit" id="btn-auth-submit" class="btn-auth-primary">
              <span>Iniciar Sesión</span>
            </button>
            <button type="button" id="btn-auth-toggle" class="btn-auth-secondary">
              ¿No tienes cuenta? <strong>Regístrate</strong>
            </button>
          </form>

          <div id="auth-error" class="auth-error hide"></div>
        </div>
      </div>

      <!-- ========== MAIN APP SCREEN ========== -->
      <div id="main-screen" class="screen hide">

        <!-- TOP BAR -->
        <header class="m-header">
          <div class="m-header-left">
            <div class="m-logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
              </svg>
            </div>
            <div>
              <h1 class="m-logo-text">Glosario<span>Técnico</span></h1>
              <span class="m-badge-cloud" id="m-sync-badge">Conectado</span>
            </div>
          </div>
          <button id="btn-m-logout" class="m-header-btn" title="Cerrar sesión">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
            </svg>
          </button>
        </header>

        <!-- SEARCH BAR -->
        <div class="m-search-section">
          <div class="m-search-bar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="m-search-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            <input type="text" id="m-input-search" placeholder="Buscar término..." autocomplete="off" />
          </div>

          <!-- Category pills horizontal scroll -->
          <div class="m-categories-scroll">
            <div id="m-categories-list" class="m-categories-list">
              <!-- Dynamically generated -->
            </div>
          </div>
        </div>

        <!-- TERMS LIST -->
        <div class="m-content">
          <div id="m-results-info" class="m-results-info">Cargando...</div>
          <div id="m-terms-list" class="m-terms-list">
            <!-- Dynamically generated term cards -->
          </div>
          <div id="m-empty-state" class="m-empty-state hide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607ZM10.5 7.5v6m3-3h-6" />
            </svg>
            <h3>No se encontró ese término</h3>
            <p>Créalo tocando el botón <strong>+</strong> de abajo.</p>
          </div>
        </div>

        <!-- FAB - Floating Action Button -->
        <button id="fab-create" class="m-fab" title="Crear término">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
        </button>

        <!-- BOTTOM NAVIGATION -->
        <nav class="m-bottom-nav">
          <button class="m-nav-item active" data-tab="home">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
            <span>Inicio</span>
          </button>
          <button class="m-nav-item" data-tab="favorites">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499c.172-.403.743-.403.915 0l2.35 4.773 5.242.763c.44.064.618.608.301.916l-3.8 3.702.898 5.223c.075.44-.39.778-.779.57L12 17.25l-4.69 2.477c-.389.208-.853-.13-1.002-.57l.899-5.223-3.8-3.702c-.317-.308-.139-.852.302-.916l5.243-.763 2.35-4.773Z" />
            </svg>
            <span>Favoritos</span>
          </button>
          <div class="m-nav-spacer"></div>
          <button class="m-nav-item" data-tab="categories">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z" />
            </svg>
            <span>Categorías</span>
          </button>
          <button class="m-nav-item" data-tab="profile">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            <span>Perfil</span>
          </button>
        </nav>

      </div>

      <!-- ========== TERM DETAIL MODAL (FULLSCREEN) ========== -->
      <div id="m-detail-modal" class="m-modal hide">
        <div class="m-modal-content">
          <div class="m-modal-header">
            <button id="btn-m-detail-back" class="m-back-btn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
              </svg>
            </button>
            <div class="m-modal-header-actions">
              <button id="btn-m-detail-fav" class="m-header-btn" title="Favorito">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499c.172-.403.743-.403.915 0l2.35 4.773 5.242.763c.44.064.618.608.301.916l-3.8 3.702.898 5.223c.075.44-.39.778-.779.57L12 17.25l-4.69 2.477c-.389.208-.853-.13-1.002-.57l.899-5.223-3.8-3.702c-.317-.308-.139-.852.302-.916l5.243-.763 2.35-4.773Z" />
                </svg>
              </button>
              <button id="btn-m-detail-edit" class="m-header-btn" title="Editar">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                </svg>
              </button>
              <button id="btn-m-detail-delete" class="m-header-btn m-btn-danger" title="Eliminar">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                </svg>
              </button>
            </div>
          </div>
          <div id="m-detail-body" class="m-detail-body">
            <!-- Dynamic content -->
          </div>
          <!-- Footer removed to eliminate IA expansion -->
        </div>
      </div>

      <!-- ========== CREATE/EDIT TERM MODAL ========== -->
      <div id="m-create-modal" class="m-modal hide">
        <div class="m-modal-content">
          <div class="m-modal-header">
            <button id="btn-m-create-back" class="m-back-btn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
              </svg>
            </button>
            <h2 id="m-create-title" class="m-modal-title">Crear Término</h2>
            <button type="button" id="btn-m-save" class="m-save-btn">Guardar</button>
          </div>
          <form id="m-term-form" class="m-form">
            <input type="hidden" id="m-form-id" />
            
            <div class="m-form-group">
              <label for="m-form-termino">Término Principal *</label>
              <div class="m-input-with-ia">
                <input type="text" id="m-form-termino" placeholder="Ej: REST API, RAG" required autocomplete="off" />
                <button type="button" id="btn-m-autofill" class="m-btn-ia-mini" title="Autocompletar con IA">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="sparkles-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 21l-.813-5.096L3.091 15 8.19 14.187 9 9l.813 5.187 5.096.813-5.096.814ZM19.07 9.14l-1.07 3.6-3.6-1.07 3.6-1.07 1.07-3.6 1.07 3.6 3.6 1.07-3.6 1.07Z" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="m-form-row">
              <div class="m-form-group">
                <label for="m-form-abreviatura">Abreviatura</label>
                <input type="text" id="m-form-abreviatura" placeholder="Ej: API" autocomplete="off" />
              </div>
              <div class="m-form-group">
                <label for="m-form-categoria">Categoría *</label>
                <input type="text" id="m-form-categoria" list="m-categories-datalist" placeholder="Seleccionar o escribir..." required autocomplete="off" />
                <datalist id="m-categories-datalist"></datalist>
              </div>
            </div>

            <div class="m-form-group">
              <label for="m-form-significado">Significado en Español *</label>
              <input type="text" id="m-form-significado" placeholder="Traducción o significado" required autocomplete="off" />
            </div>

            <div class="m-form-group">
              <label for="m-form-definicion">Definición Corta *</label>
              <textarea id="m-form-definicion" rows="2" placeholder="Resumen en 1-2 oraciones..." required></textarea>
            </div>

            <div class="m-form-group">
              <label for="m-form-explicacion">Explicación Ampliada</label>
              <textarea id="m-form-explicacion" rows="4" placeholder="Detalle técnico profundo..."></textarea>
            </div>

            <div class="m-form-group">
              <label for="m-form-tip">Tip Práctico</label>
              <textarea id="m-form-tip" rows="2" placeholder="Consejo de aplicación real..."></textarea>
            </div>

            <div class="m-form-group">
              <label for="m-form-keywords">Keywords (separadas por comas)</label>
              <input type="text" id="m-form-keywords" placeholder="vector, search, llm" autocomplete="off" />
            </div>
          </form>
        </div>
      </div>

      <!-- ========== IA DEEPDIVE MODAL ========== -->
      <div id="m-ia-modal" class="m-modal hide">
        <div class="m-modal-content">
          <div class="m-modal-header">
            <button id="btn-m-ia-back" class="m-back-btn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
              </svg>
            </button>
            <h2 class="m-modal-title">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="sparkles-icon" style="width:20px;height:20px;color:var(--ia-color);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 21l-.813-5.096L3.091 15 8.19 14.187 9 9l.813 5.187 5.096.813-5.096.814ZM19.07 9.14l-1.07 3.6-3.6-1.07 3.6-1.07 1.07-3.6 1.07 3.6 3.6 1.07-3.6 1.07Z" />
              </svg>
              Guía de IA
            </h2>
          </div>
          <div id="m-ia-content" class="m-ia-content">
            <!-- AI generated content -->
          </div>
        </div>
      </div>

      <!-- TOAST -->
      <div id="m-toast-container" class="m-toast-container"></div>

    </div>
    <script type="module" src="/src/mobile.js"></script>
  </body>
</html>
